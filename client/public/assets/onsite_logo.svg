<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">OnSite Fleet and Auto Care</title>
  <desc id="desc">White OnSite wordmark with navy outline and orange Fleet and Auto Care banner</desc>
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f07a17"/>
      <stop offset="0.5" stop-color="#ff9d24"/>
      <stop offset="1" stop-color="#e76500"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000814" flood-opacity="0.72"/>
