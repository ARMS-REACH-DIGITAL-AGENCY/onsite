      <text x="450" y="215" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="224" font-weight="900" fill="#ffffff" stroke="#08204f" stroke-width="26" paint-order="stroke">ONSITE</text>
      <text x="450" y="215" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="224" font-weight="900" fill="#ffffff" stroke="#395690" stroke-width="10" paint-order="stroke">ONSITE</text>
    </g>
    <path d="M92 245 C278 205 625 205 808 244 C630 232 278 234 92 272 Z" fill="url(#orange)" stroke="#08204f" stroke-width="18"/>
    <path d="M118 301 C285 287 616 287 784 301 L764 356 C592 338 309 338 138 356 Z" fill="#173f80" stroke="#08204f" stroke-width="12"/>
    <text x="450" y="341" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="62" font-weight="900" letter-spacing="2" fill="#ff9420" stroke="#08204f" stroke-width="8" paint-order="stroke">FLEET &amp; AUTO CARE</text>
